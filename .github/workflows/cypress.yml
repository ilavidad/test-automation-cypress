name: Cypress E2E

on:
  push:
  pull_request:

jobs:
  cypress:
    runs-on: ubuntu-latest
    env:
      OPENCART_TEST_EMAIL: ${{ secrets.OPENCART_TEST_EMAIL }}
      OPENCART_TEST_PASSWORD: ${{ secrets.OPENCART_TEST_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint JavaScript
        run: npm run lint

      - name: Validate required test credentials
        run: npm run validate:env

      - name: Create Cypress environment file
        run: >
          node -e "const fs = require('fs');
          fs.writeFileSync('cypress.env.json', JSON.stringify({
          validUser: { email: process.env.OPENCART_TEST_EMAIL, password: process.env.OPENCART_TEST_PASSWORD }
          }, null, 2));"

      - name: Run Cypress tests
        run: npm run test

      - name: Upload Cucumber HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: cypress/reports
          if-no-files-found: ignore

      - name: Upload Cypress artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            cypress/screenshots
            cypress/videos
          if-no-files-found: ignore
